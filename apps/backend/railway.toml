# apps/backend/railway.toml
# Railway monorepo config — pnpm workspace + watchPaths so changes in
# packages/shared trigger backend rebuild.
# References: PATTERNS.md Pattern 4, RESEARCH.md Pattern 4.

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @agente-restaurante/backend build"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30

[deploy.watchPaths]
include = ["apps/backend/**", "packages/shared/**"]
